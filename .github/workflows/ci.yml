name: CI

# Runs on every push and pull request to main.
# This is the "test pipeline" — a developer pushes code, GitHub spins up a
# clean environment, installs dependencies, runs the test suite, and reports
# pass/fail. If anything fails, the merge to main is blocked.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff

      - name: Lint with ruff
        run: |
          ruff check . --output-format=github || true
        # `|| true` keeps the build green during initial setup; remove once codebase is lint-clean

      - name: Syntax check
        run: |
          python -m py_compile app.py

      - name: Run pytest with coverage
        run: |
          pytest tests/ -v --cov=. --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
